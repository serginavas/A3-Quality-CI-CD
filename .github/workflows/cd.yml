name: Django CD #proba

on:
  workflow_run:
    workflows: ["Django CI"]
    types:
      - completed
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Aquesta condició és la que realment mira si el CI ha anat bé
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    
    steps:
      - name: Deploy to Render
        run: |
          curl -X GET ${{ secrets.RENDER_DEPLOY_HOOK }}
